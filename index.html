<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Job Application Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&family=Manrope:wght@200..800&display=swap"
      rel="stylesheet"
    />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>
  </head>
  <body class="bg-gray-100">
    <div class="max-w-4xl mx-auto p-6">
      <h1 class="text-3xl font-bold mb-6">Job Application Tracker</h1>

      <!-- Dashboard -->
      <div class="grid md:grid-cols-3 gap-4 mb-8">
        <div class="bg-white p-4 rounded shadow">
          <h2 class="text-gray-500">Total</h2>
          <p id="allCount" class="text-2xl font-bold text-blue-600">0</p>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <h2 class="text-gray-500">Interview</h2>
          <p id="interviewCount" class="text-2xl font-bold text-green-600">0</p>
        </div>
        <div class="bg-white p-4 rounded shadow">
          <h2 class="text-gray-500">Rejected</h2>
          <p id="rejectedCount" class="text-2xl font-bold text-red-600">0</p>
        </div>
      </div>
            <!-- Header -->
      <div class="flex justify-between items-center mb-4">
        <h2 class="text-xl font-semibold">Available Jobs</h2>
        <button
          onclick="resetToAll()"
          id="jobCountBtn"
          class="text-blue-600 font-medium hover:underline"
        >
          0 Jobs
        </button>
      </div>

      <!-- Tabs -->
      <div class="flex gap-4 mb-6">
        <button
          onclick="showTab('all')"
          id="tab-all"
          class="tabBtn px-4 py-2 rounded bg-blue-500 text-white"
        >
          All
        </button>

        <button
          onclick="showTab('interview')"
          id="tab-interview"
          class="tabBtn px-4 py-2 rounded bg-gray-200"
        >
          Interview
        </button>

        <button
          onclick="showTab('rejected')"
          id="tab-rejected"
          class="tabBtn px-4 py-2 rounded bg-gray-200"
        >
          Rejected
        </button>
      </div>

      <!-- Jobs Container -->
      <div id="jobContainer" class="grid grid-cols-1 gap-6"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center mt-10">
        <div class="text-5xl mb-4">📂</div>
        <h3 class="text-xl font-semibold">No Jobs Available</h3>
      </div>
    </div>
